name: CI Dev Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

jobs:
  security-and-tests:
    name: Security and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and CI tools
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8 bandit pip-audit pytest pytest-cov

      - name: Run flake8
        run: |
          flake8 app/ tests/ --max-line-length=100 --exclude=__pycache__

      - name: Run Bandit
        run: |
          bandit -r app -q

      - name: Run pip-audit
        run: |
          pip-audit -r app/requirements.txt --progress-spinner=off

      - name: Run pytest with coverage
        run: |
          pytest tests/ --cov=app
