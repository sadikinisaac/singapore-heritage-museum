# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Development Branch
# Triggers on: push to dev, PRs into dev
# Steps: lint → dependency scan (safety) → SAST (bandit) → unit tests
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Dev Branch

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run linter
        run: flake8 app/ tests/ --max-line-length=100 --exclude=__pycache__

  dependency-scan:
    name: Dependency Security Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: pip-audit -r app/requirements.txt --output-format=json | tee pip-audit-report.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  sast:
    name: Static Application Security Testing (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: bandit -r app/ -f json -o bandit-report.json || true
        # '|| true' prevents the job from failing on low-severity findings;
        # remove it if you want the pipeline to fail on any finding.

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

      - name: Fail on HIGH severity
        run: |
          HIGH=$(python -c "import json,sys; d=json.load(open('bandit-report.json')); \
            high=[r for r in d['results'] if r['issue_severity']=='HIGH']; \
            print(len(high))")
          echo "High severity findings: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "::error::Bandit found HIGH severity issues. Review bandit-report.json."
            exit 1
          fi

  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: testing
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
