
name: CI Dev Pipeline

on:
  push:
    branches:
      - dev

jobs:
  security-and-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r app/requirements.txt

      - run: flake8 app

      - run: bandit -r app

      - run: pip-audit

      - run: pytest --cov=app
