name: CI - Test and Security Checks

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
      - feature/ian-cicd-ecr-ecs

jobs:
  test-and-security:
    name: Run lint, tests and security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install application and security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8 bandit pip-audit pytest

      - name: Run flake8 lint check
        run: |
          flake8 app/ tests/ --max-line-length=100 --exclude=__pycache__

      - name: Run pip-audit dependency vulnerability scan
        run: |
          pip-audit -r app/requirements.txt --progress-spinner=off

      - name: Run Bandit static security scan
        run: |
          bandit -r app/ -q

      - name: Run pytest
        run: |
          pytest tests/ -v
