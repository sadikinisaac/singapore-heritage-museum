
name: CD Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Manual Approval Gate
        run: echo "Production approval required"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ap-southeast-1

      - name: Build Docker Image
        run: docker build -t museum-app .

      - name: Scan with Trivy
        run: trivy image museum-app

      - name: Push to ECR
        run: echo "Push image to ECR"

      - name: Deploy Blue-Green via CodeDeploy
        run: echo "Deploy production ECS service"

      - name: Create Release Tag
        run: |
          git tag v1.${{ github.run_number }}
          git push origin --tags
