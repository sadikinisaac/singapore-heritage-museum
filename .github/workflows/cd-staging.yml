# ─────────────────────────────────────────────────────────────────────────────
# CD Pipeline — Staging Branch
# Triggers on: push / merge to staging
# Credentials used here are DIFFERENT from production (separate AWS role / secret)
# Steps: build image → container image scan (Trivy) → push image → deploy staging
# ─────────────────────────────────────────────────────────────────────────────

name: CD — Staging Deployment

on:
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/singapore-museum

jobs:
  build-and-scan:
    name: Build Docker Image & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # to push to GHCR
      security-events: write # to upload SARIF

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      # ── Log in to container registry ──────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # STAGING_REGISTRY_TOKEN is a separate PAT scoped only to staging namespace
          password: ${{ secrets.STAGING_REGISTRY_TOKEN }}

      # ── Build image ───────────────────────────────────────────────────────
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false           # we scan before pushing
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          load: true

      # ── Container image vulnerability scan (Trivy) ────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}"
          format: "sarif"
          output: "trivy-staging.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"     # fail pipeline on CRITICAL/HIGH CVEs

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-staging.sarif

      # ── Push to registry only if scan passed ─────────────────────────────
      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-scan
    environment: staging   # GitHub Environments — requires reviewers if set

    steps:
      - uses: actions/checkout@v4

      # Staging uses STAGING_* secrets — NEVER the production secrets
      - name: Write staging .env
        run: |
          echo "FLASK_ENV=staging"                        >> .env
          echo "APP_VERSION=${{ github.sha }}"           >> .env
          echo "SECRET_KEY=${{ secrets.STAGING_SECRET_KEY }}" >> .env
          echo "APP_PORT=5000"                            >> .env

      - name: Deploy with Docker Compose (staging)
        run: |
          docker compose -f docker-compose.yml up -d --force-recreate
        env:
          APP_VERSION: staging-${{ github.sha }}
          SECRET_KEY: ${{ secrets.STAGING_SECRET_KEY }}
          FLASK_ENV: staging

      - name: Smoke test — health endpoint
        run: |
          sleep 10
          curl --fail http://localhost:5000/health || \
            (echo "::error::Staging health check failed!" && exit 1)
