# ─────────────────────────────────────────────────────────────────────────────
# Singapore Heritage Museum — Docker Compose
# Environments: dev (docker-compose up) | prod (docker-compose -f docker-compose.yml -f docker-compose.prod.yml up)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Flask App ──────────────────────────────────────────────────────────────
  museum-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: singapore-museum:${APP_VERSION:-latest}
    container_name: museum-app
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      SECRET_KEY: ${SECRET_KEY:?err}      # Must be set in .env — never hardcoded
    ports:
      - "${APP_PORT:-5001}:5000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - museum-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: museum-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      museum-app:
        condition: service_healthy
    networks:
      - museum-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  museum-net:
    driver: bridge
