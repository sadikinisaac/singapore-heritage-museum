version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Production overrides — merge with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  museum-app:
    environment:
      FLASK_ENV: production
    # In prod: use a pre-built image from your registry, e.g.:
    # image: ghcr.io/your-org/singapore-museum:${APP_VERSION}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
